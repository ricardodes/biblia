<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bíblia ARC • Estudo + Revelações</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .titulo-biblia { font-family: 'Playfair Display', serif; }
    .verso { line-height: 1.85; }
    .numero-verso { color: #b91c1c; font-weight: 700; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-gradient-to-r from-indigo-700 via-purple-700 to-red-700 text-white shadow-xl sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-book-bible text-4xl"></i>
        <div>
          <h1 class="text-3xl font-bold titulo-biblia tracking-tight">Bíblia ARC</h1>
          <p class="text-xs opacity-75 -mt-1">Estudo Completo • Imagens • Revelações</p>
        </div>
      </div>
      <input id="busca" placeholder="Buscar versículo ou livro..." class="bg-white/20 text-white placeholder-white/70 px-5 py-3 rounded-3xl w-96 focus:outline-none focus:ring-2 focus:ring-white/50">
    </div>
  </nav>

  <div class="max-w-7xl mx-auto flex flex-col lg:flex-row gap-8 p-6">

    <!-- Sidebar Livros -->
    <div class="lg:w-80 bg-white dark:bg-zinc-900 rounded-3xl shadow-2xl p-6 h-fit sticky top-24">
      <h2 class="font-bold text-xl mb-5 flex items-center gap-3"><i class="fa-solid fa-list"></i> Livros da Bíblia</h2>
      <div id="lista-livros" class="max-h-[75vh] overflow-y-auto pr-3 space-y-2 text-sm"></div>
    </div>

    <!-- Área Principal -->
    <div class="flex-1 space-y-8">
      <div class="flex justify-between items-end">
        <div>
          <h1 id="titulo-capitulo" class="text-4xl font-bold titulo-biblia"></h1>
          <p id="subtitulo" class="text-zinc-500 dark:text-zinc-400 mt-1">Almeida Revista e Corrigida • 2009</p>
        </div>
        <div id="navegacao-capitulos" class="flex gap-2"></div>
      </div>

      <!-- Abas -->
      <div class="flex border-b border-zinc-300 dark:border-zinc-700">
        <button onclick="mudarAba(0)" id="aba-0" class="aba px-8 py-4 font-medium border-b-4 border-red-600 text-red-600">📖 Texto ARC</button>
        <button onclick="mudarAba(1)" id="aba-1" class="aba px-8 py-4 font-medium">📝 Estudos & Comentários</button>
        <button onclick="mudarAba(2)" id="aba-2" class="aba px-8 py-4 font-medium">🔥 Revelações Espirituais</button>
        <button onclick="mudarAba(3)" id="aba-3" class="aba px-8 py-4 font-medium">🖼️ Imagens</button>
        <button onclick="mudarAba(4)" id="aba-4" class="aba px-8 py-4 font-medium">🎥 Pregações</button>
      </div>

      <!-- Conteúdos das abas -->
      <div id="conteudo-0" class="aba-conteudo"> <!-- Texto -->
        <div id="texto-biblia" class="space-y-7 text-[1.1rem]"></div>
      </div>

      <div id="conteudo-1" class="aba-conteudo hidden"> <!-- Estudos -->
        <div id="estudos-conteudo" class="bg-white dark:bg-zinc-900 p-8 rounded-3xl shadow-inner prose dark:prose-invert max-w-none">
          <p class="text-amber-600 dark:text-amber-400 font-medium">Carregando estudos para este capítulo...</p>
          <!-- Aqui vamos colocar resumos ou links para fontes como BibliaTodo, BibliaOnline, etc. -->
        </div>
      </div>

      <div id="conteudo-2" class="aba-conteudo hidden"> <!-- Revelações -->
        <div id="revelacoes-conteudo" class="bg-gradient-to-br from-amber-50 to-white dark:from-zinc-900 dark:to-zinc-800 p-8 rounded-3xl shadow-inner">
          <h3 class="text-2xl font-semibold mb-4 flex items-center gap-3"><i class="fa-solid fa-fire text-orange-500"></i> Revelação do Espírito para hoje</h3>
          <div id="revelacao-texto" class="text-lg leading-relaxed"></div>
        </div>
      </div>

      <div id="conteudo-3" class="aba-conteudo hidden grid grid-cols-1 md:grid-cols-2 gap-6" id="galeria"></div>

      <div id="conteudo-4" class="aba-conteudo hidden" id="pregaoes"></div>
    </div>
  </div>

  <script>
    // (O código de carregamento da Bíblia ARC continua igual ao anterior – para não ficar gigante aqui)
    // Copie o script inteiro do meu último código (carregarBiblia, carregarCapitulo, etc.) e cole aqui embaixo.

    // Exemplo de como adicionar estudos e revelações por capítulo (você expande isso):
    function mostrarEstudosE revelacoes(abbrev, capitulo) {
      // Estudos - você pode colar resumos ou links
      document.getElementById('estudos-conteudo').innerHTML = `
        <h3 class="font-bold text-2xl mb-6">Estudos e Comentários</h3>
        <p>Para comentários versículo por versículo:</p>
        <ul class="list-disc pl-6 space-y-2 mt-4">
          <li><a href="https://www.bibliatodo.com/pt/a-biblia/versao/almeida-revista-e-corrigida/${abbrev.toLowerCase()}-${capitulo}" target="_blank" class="text-blue-600 hover:underline">BibliaTodo - ARC + comentários</a></li>
          <li><a href="https://www.bibliaonline.com.br/arc/${abbrev.toLowerCase()}/${capitulo}" target="_blank" class="text-blue-600 hover:underline">BibliaOnline - ARC com devocionais</a></li>
          <li><a href="https://www.apologeta.com.br/biblia-comentada/" target="_blank" class="text-blue-600 hover:underline">Apologeta - Comentários versículo por versículo (NT)</a></li>
        </ul>
        <p class="mt-8 text-sm opacity-70">Dica: Abra esses links e copie os melhores insights para colocar aqui no seu site.</p>
      `;

      // Revelações (exemplo genérico - você personaliza)
      document.getElementById('revelacao-texto').innerHTML = `
        <p class="italic">"Este capítulo revela que Deus é soberano em toda a criação/história/redenção..."</p>
        <p class="mt-6">Aplicação prática: Como essa passagem fala com a sua vida hoje? Qual revelação o Espírito Santo trouxe ao seu coração?</p>
        <p class="mt-8 text-xs bg-yellow-100 dark:bg-yellow-900 p-4 rounded-2xl">Escreva aqui suas próprias revelações ou resumos de pregações que você ouviu.</p>
      `;
    }

    // Atualize a função carregarCapitulo para chamar mostrarEstudosE revelacoes(livro.abbrev, capitulo);
  </script>
</body>
</html>
