<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bíblia ARC • Estudo + Revelações</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .titulo-biblia { font-family: 'Playfair Display', serif; }
    .verso { line-height: 1.85; }
    .numero-verso { color: #b91c1c; font-weight: 700; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-screen">

  <nav class="bg-gradient-to-r from-indigo-700 via-purple-700 to-red-700 text-white shadow-xl sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-book-bible text-4xl"></i>
        <div>
          <h1 class="text-3xl font-bold titulo-biblia">Bíblia ARC</h1>
          <p class="text-xs opacity-75">Estudo Completo com Imagens e Revelações</p>
        </div>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto flex flex-col lg:flex-row gap-8 p-6">

    <!-- Sidebar -->
    <div class="lg:w-80 bg-white dark:bg-zinc-900 rounded-3xl shadow-2xl p-6 h-fit sticky top-6">
      <h2 class="font-bold text-xl mb-5 flex items-center gap-3"><i class="fa-solid fa-book"></i> Livros</h2>
      <div id="lista-livros" class="max-h-[75vh] overflow-y-auto space-y-1 text-sm"></div>
    </div>

    <!-- Principal -->
    <div class="flex-1">
      <div class="mb-6">
        <h1 id="titulo-capitulo" class="text-4xl font-bold titulo-biblia"></h1>
        <p id="subtitulo" class="text-zinc-500 dark:text-zinc-400"></p>
      </div>

      <!-- Abas -->
      <div class="flex border-b mb-6 text-sm">
        <button onclick="mudarAba(0)" id="aba-0" class="aba px-6 py-3 font-medium border-b-4 border-red-600">📖 Texto</button>
        <button onclick="mudarAba(1)" id="aba-1" class="aba px-6 py-3 font-medium">📝 Estudos</button>
        <button onclick="mudarAba(2)" id="aba-2" class="aba px-6 py-3 font-medium">🔥 Revelações</button>
        <button onclick="mudarAba(3)" id="aba-3" class="aba px-6 py-3 font-medium">🖼️ Imagens</button>
      </div>

      <div id="conteudo-0" class="aba-conteudo">
        <div id="navegacao-capitulos" class="flex flex-wrap gap-2 mb-8"></div>
        <div id="texto-biblia" class="space-y-6 text-lg"></div>
      </div>

      <div id="conteudo-1" class="aba-conteudo hidden">Estudos virão aqui...</div>
      <div id="conteudo-2" class="aba-conteudo hidden">Revelações virão aqui...</div>
      <div id="conteudo-3" class="aba-conteudo hidden">Imagens virão aqui...</div>
    </div>
  </div>

  <script>
    let biblia = null;
    let livroIndexAtual = 0;
    let capituloAtual = 1;

    async function carregarBiblia() {
      try {
        const url = "https://raw.githubusercontent.com/maatheusgois/bible/main/versions/pt-br/arc.json";
        const res = await fetch(url);
        if (!res.ok) throw new Error("Falha ao carregar");
        biblia = await res.json();
        
        console.log("Bíblia carregada com", biblia.length, "livros");
        renderizarListaLivros();
        carregarCapitulo(0, 1); // Começa com Gênesis 1
      } catch (e) {
        console.error(e);
        alert("Não consegui carregar a Bíblia. Verifique sua internet ou tente novamente.");
      }
    }

    function renderizarListaLivros() {
      const container = document.getElementById('lista-livros');
      container.innerHTML = '';
      biblia.forEach((livro, index) => {
        const div = document.createElement('div');
        div.className = `px-4 py-3 rounded-2xl cursor-pointer hover:bg-indigo-50 dark:hover:bg-zinc-800 flex justify-between ${index === livroIndexAtual ? 'bg-indigo-100 dark:bg-zinc-700 font-medium' : ''}`;
        div.innerHTML = `
          <span>${livro.name}</span>
          <span class="text-xs bg-zinc-200 dark:bg-zinc-700 px-2.5 py-0.5 rounded-full">${livro.chapters.length} cap</span>
        `;
        div.onclick = () => carregarCapitulo(index, 1);
        container.appendChild(div);
      });
    }

    function carregarCapitulo(index, capitulo) {
      livroIndexAtual = index;
      capituloAtual = capitulo;
      const livro = biblia[index];

      document.getElementById('titulo-capitulo').innerHTML = `${livro.name} <span class="text-2xl text-zinc-400 font-normal">${capitulo}</span>`;
      document.getElementById('subtitulo').textContent = 'Almeida Revista e Corrigida (ARC)';

      // Texto dos versículos
      const versos = livro.chapters[capitulo - 1] || [];
      let html = '';
      versos.forEach((texto, i) => {
        html += `
          <div class="verso flex gap-5 group">
            <span class="numero-verso text-xl w-8 flex-shrink-0 text-right">${i+1}</span>
            <p class="flex-1">${texto}</p>
          </div>`;
      });
      document.getElementById('texto-biblia').innerHTML = html || '<p class="text-red-500">Capítulo não encontrado.</p>';

      // Navegação de capítulos (agora mais robusta)
      renderizarNavegacaoCapitulo(livro);
    }

    function renderizarNavegacaoCapitulo(livro) {
      const container = document.getElementById('navegacao-capitulos');
      container.innerHTML = '<span class="text-sm text-zinc-500 mr-4 self-center">Capítulos:</span>';

      const total = livro.chapters.length;
      for (let i = 1; i <= total; i++) {
        const btn = document.createElement('button');
        btn.className = `px-4 py-2 rounded-2xl text-sm transition-all ${i === capituloAtual 
          ? 'bg-red-600 text-white shadow' 
          : 'bg-white dark:bg-zinc-800 hover:bg-gray-100 dark:hover:bg-zinc-700'}`;
        btn.textContent = i;
        btn.onclick = () => carregarCapitulo(livroIndexAtual, i);
        container.appendChild(btn);
      }
    }

    function mudarAba(n) {
      document.querySelectorAll('.aba-conteudo').forEach(el => el.classList.add('hidden'));
      document.getElementById('conteudo-' + n).classList.remove('hidden');
    }

    // Iniciar
    carregarBiblia();
  </script>
</body>
</html>
